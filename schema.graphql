scalar JSON

"""通用狀態"""
enum Status {
  """停用"""
  inactive

  """啟用"""
  active

  """已刪除"""
  deleted
}

"""計算任務狀態"""
enum ComputeStatus {
  """初始"""
  initial

  """等待中"""
  pending

  """計算中"""
  computing

  """已完成"""
  completed

  """失敗"""
  failed

  """已取消"""
  cancelled
}

"""帳號角色"""
enum AccountRole {
  """系統管理員"""
  admin

  """管理者"""
  manager

  """一般使用者"""
  normal

  """訪客"""
  guest

  """唯讀"""
  just_view
}

type Query {
  """取得目前登入的帳號資訊，未登入回傳 null"""
  me: Account

  """取得目前登入帳號的點數異動紀錄"""
  pointLogs: [PointLog!]!

  """取得所有地點，可依狀態篩選"""
  destinations(
    """篩選狀態，不傳則回傳全部"""
    status: Status
  ): [Destination!]!

  """取得單一地點"""
  destination(id: ID!): Destination

  """取得所有車型，可依狀態篩選"""
  customVehicleTypes(status: Status): [CustomVehicleType!]!

  """取得單一車型"""
  customVehicleType(id: ID!): CustomVehicleType

  """取得所有車輛，可依狀態篩選"""
  vehicles(status: Status): [Vehicle!]!

  """取得單一車輛"""
  vehicle(id: ID!): Vehicle

  """取得所有任務單，可依狀態篩選"""
  orders(status: Status): [Order!]!

  """取得單一任務單"""
  order(id: ID!): Order

  """取得計算任務列表，可依任務單或計算狀態篩選"""
  computes(
    """篩選特定任務單"""
    orderId: ID

    """篩選計算狀態"""
    status: ComputeStatus
  ): [Compute!]!

  """取得單一計算任務"""
  compute(id: ID!): Compute
}

type Mutation {
  """註冊新帳號"""
  register(
    """登入帳號名稱"""
    account: String!

    """電子郵件"""
    email: String!

    """密碼"""
    password: String!

    """聯絡人姓名"""
    people_name: String!
  ): AuthPayload!

  """登入，回傳 JWT Token"""
  login(
    """登入帳號名稱"""
    account: String!

    """密碼"""
    password: String!
  ): AuthPayload!

  """新增地點"""
  createDestination(
    """地點名稱"""
    name: String!

    """地址"""
    address: String!

    """緯度"""
    lat: String!

    """經度"""
    lng: String!

    """自訂擴充資料"""
    data: JSON

    """備註"""
    comment_for_account: String
  ): Destination!

  """更新地點"""
  updateDestination(id: ID!, name: String, address: String, lat: String, lng: String, data: JSON, comment_for_account: String): Destination!

  """刪除地點（軟刪除，狀態改為 deleted）"""
  deleteDestination(id: ID!): Destination!

  """新增車型"""
  createCustomVehicleType(
    """車型名稱"""
    name: String!

    """載重容量"""
    capacity: Int!

    """自訂擴充資料"""
    data: JSON

    """備註"""
    comment_for_account: String
  ): CustomVehicleType!

  """更新車型"""
  updateCustomVehicleType(id: ID!, name: String, capacity: Int, data: JSON, comment_for_account: String): CustomVehicleType!

  """刪除車型（軟刪除）"""
  deleteCustomVehicleType(id: ID!): CustomVehicleType!

  """新增車輛"""
  createVehicle(
    """車牌號碼"""
    vehicle_number: String!

    """車型 ID"""
    vehicle_type: ID!

    """停放倉庫（地點）ID"""
    depot_id: ID

    """自訂擴充資料"""
    data: JSON

    """備註"""
    comment_for_account: String
  ): Vehicle!

  """更新車輛"""
  updateVehicle(id: ID!, vehicle_number: String, vehicle_type: ID, depot_id: ID, data: JSON, comment_for_account: String): Vehicle!

  """刪除車輛（軟刪除）"""
  deleteVehicle(id: ID!): Vehicle!

  """
  新增任務單。
  建立時會自動呼叫 Google Routes API 計算並快取地點間的距離與行駛時間。
  """
  createOrder(
    """地點快照，格式參考 Destination 型別"""
    destination_snapshot: JSON!

    """車輛快照，格式參考 Vehicle 型別"""
    vehicle_snapshot: JSON!

    """自訂擴充資料"""
    data: JSON

    """備註"""
    comment_for_account: String
  ): Order!

  """刪除任務單（軟刪除）"""
  deleteOrder(id: ID!): Order!

  """
  發起 VRP 路徑規劃計算。
  計算為非同步，狀態由 compute_status 追蹤，結果透過 webhook 寫入。
  """
  createCompute(
    """任務單 ID"""
    order_id: ID!

    """自訂擴充資料，可傳入 time_limit_seconds 控制計算時限（預設 30 秒）"""
    data: JSON

    """備註"""
    comment_for_account: String
  ): Compute!

  """取消計算任務"""
  cancelCompute(id: ID!): Compute!
}

"""帳號"""
type Account {
  account_id: ID!

  """帳號狀態"""
  status: Status!

  """帳號角色"""
  account_role: AccountRole!

  """登入帳號名稱（唯一）"""
  account: String!

  """電子郵件（唯一）"""
  email: String!

  """公司名稱"""
  company_name: String

  """公司產業"""
  company_industry: String

  """聯絡人姓名"""
  people_name: String!

  """聯絡電話"""
  phone: String

  """剩餘點數"""
  point: Int!

  """建立時間（Unix timestamp）"""
  created_at: Float

  """更新時間（Unix timestamp）"""
  updated_at: Float

  """自訂擴充資料"""
  data: JSON

  """點數異動紀錄"""
  point_logs: [PointLog!]!
}

"""登入 / 註冊回傳結果"""
type AuthPayload {
  """JWT Token"""
  token: String!

  """帳號資料"""
  account: Account!
}

"""點數異動紀錄"""
type PointLog {
  id: ID!
  account_id: Int!

  """點數變動量（正為增加，負為扣除）"""
  change: Int!

  """異動原因"""
  reason: String!

  """自訂擴充資料"""
  data: JSON

  """建立時間（Unix timestamp）"""
  created_at: Float
}

"""地點（停靠站 / 倉庫）"""
type Destination {
  id: ID!
  account_id: Int!

  """地點狀態"""
  status: Status!

  """地點名稱"""
  name: String!

  """地址"""
  address: String!

  """緯度"""
  lat: String!

  """經度"""
  lng: String!

  """自訂擴充資料"""
  data: JSON

  """建立時間（Unix timestamp）"""
  created_at: Float

  """更新時間（Unix timestamp）"""
  updated_at: Float

  """備註"""
  comment_for_account: String
}

"""自訂車輛類型"""
type CustomVehicleType {
  id: ID!
  account_id: Int!

  """狀態"""
  status: Status!

  """車型名稱"""
  name: String!

  """載重容量"""
  capacity: Int!

  """自訂擴充資料"""
  data: JSON

  """建立時間（Unix timestamp）"""
  created_at: Float

  """更新時間（Unix timestamp）"""
  updated_at: Float

  """備註"""
  comment_for_account: String
}

"""車輛"""
type Vehicle {
  id: ID!
  account_id: Int!

  """狀態"""
  status: Status!

  """車牌號碼"""
  vehicle_number: String!

  """車型 ID"""
  vehicle_type: Int!

  """停放倉庫（地點）ID"""
  depot_id: Int

  """自訂擴充資料"""
  data: JSON

  """建立時間（Unix timestamp）"""
  created_at: Float

  """更新時間（Unix timestamp）"""
  updated_at: Float

  """備註"""
  comment_for_account: String

  """車型詳細資料"""
  vehicleTypeInfo: CustomVehicleType

  """停放倉庫地點"""
  depot: Destination
}

"""派車任務單，包含地點與車輛快照"""
type Order {
  id: ID!
  account_id: Int!

  """狀態"""
  status: Status!

  """自訂擴充資料"""
  data: JSON

  """建立時間（Unix timestamp）"""
  created_at: Float

  """更新時間（Unix timestamp）"""
  updated_at: Float

  """建立時的地點快照（JSON 陣列）"""
  destination_snapshot: JSON!

  """建立時的車輛快照（JSON 陣列）"""
  vehicle_snapshot: JSON!

  """備註"""
  comment_for_account: String

  """此任務單的所有計算任務"""
  computes: [Compute!]!
}

"""VRP 路徑規劃計算任務"""
type Compute {
  id: ID!
  account_id: Int!

  """所屬任務單 ID"""
  order_id: Int!

  """狀態"""
  status: Status!

  """計算狀態"""
  compute_status: ComputeStatus!

  """計算開始時間（Unix timestamp）"""
  start_time: Float

  """計算結束時間（Unix timestamp）"""
  end_time: Float

  """失敗原因"""
  fail_reason: String

  """自訂擴充資料"""
  data: JSON

  """建立時間（Unix timestamp）"""
  created_at: Float

  """更新時間（Unix timestamp）"""
  updated_at: Float

  """備註"""
  comment_for_account: String

  """計算結果路線列表"""
  routes: [Route!]!
}

"""單一車輛的派車路線"""
type Route {
  id: ID!
  compute_id: Int!
  vehicle_id: Int!

  """狀態"""
  status: Status!

  """總行駛距離（公尺）"""
  total_distance: Int!

  """總行駛時間（分鐘）"""
  total_time: Int!

  """總載重量"""
  total_load: Int!

  """建立時間（Unix timestamp）"""
  created_at: Float

  """派送車輛"""
  vehicle: Vehicle

  """停靠站順序列表"""
  stops: [RouteStop!]!
}

"""路線中的單一停靠站"""
type RouteStop {
  id: ID!
  route_id: Int!
  destination_id: Int!

  """停靠順序（從 0 開始）"""
  sequence: Int!

  """預計抵達時間（分鐘，從當日 00:00 起算）"""
  arrival_time: Int!

  """此站需求量"""
  demand: Int!

  """建立時間（Unix timestamp）"""
  created_at: Float

  """地點詳細資料"""
  destination: Destination
}